name: Health Tracker
version: "1.1.3"
slug: health_tracker
description: Self-hosted health tracker — nutrition, medications, workouts, health metrics, AI import, Health Connect sync
url: https://health.cjsaba.com
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
webui: "http://[HOST]:[PORT:80]"
ingress: true
ingress_port: 8100
panel_icon: mdi:heart-pulse
panel_title: Health Tracker
ports:
  80/tcp: 8099
  4001/tcp: null
  8002/tcp: null
ports_description:
  80/tcp: Web UI (React SPA + API)
  4001/tcp: Sparky bridge direct port (optional — also proxied at /sparky on the web port)
  8002/tcp: MCP server for Claude Desktop (optional)
options:
  # ── Database ──────────────────────────────────────────────
  mongodb_url: ""
  database_name: "healthtracker"
  # ── Application ───────────────────────────────────────────
  app_name: "Health Tracker"
  app_base_url: ""
  secret_key: ""
  environment: production
  cors_origins: ""
  # ── Authentication ────────────────────────────────────────
  auth_method: home_assistant
  ha_url: ""
  ha_internal_url: ""
  # ── OIDC (only when auth_method: oidc) ────────────────────
  oidc_authority: ""
  oidc_client_id: ""
  oidc_scope: "openid profile email"
  oidc_audience: ""
  oidc_proxy_host: ""
  # ── Integrations ──────────────────────────────────────────
  usda_api_key: ""
  sparky_ignored_metrics: ""
schema:
  # ── Database ──────────────────────────────────────────────
  mongodb_url: str
  database_name: "str?"
  # ── Application ───────────────────────────────────────────
  app_name: "str?"
  app_base_url: url
  secret_key: password
  environment: "list(production|development)"
  cors_origins: "str?"
  # ── Authentication ────────────────────────────────────────
  auth_method: "list(home_assistant|oidc)"
  ha_url: "str?"
  ha_internal_url: "str?"
  # ── OIDC (only when auth_method: oidc) ────────────────────
  oidc_authority: "str?"
  oidc_client_id: "str?"
  oidc_scope: "str?"
  oidc_audience: "str?"
  oidc_proxy_host: "str?"
  # ── Integrations ──────────────────────────────────────────
  usda_api_key: "password?"
  sparky_ignored_metrics: "str?"
