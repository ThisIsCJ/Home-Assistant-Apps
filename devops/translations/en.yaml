configuration:
  app_name:
    name: Application name
    description: >-
      Display name used in the UI until a site name is set in
      Admin → Branding (which then takes precedence).
  admin_group:
    name: Admin group
    description: >-
      Group name granted to platform admins. You normally don't need to
      change this.
  admin_users:
    name: Admin users
    description: >-
      Home Assistant usernames that get platform-admin rights. Leave empty
      to make every Home Assistant user who can open the panel an admin.
  log_level:
    name: Log level
    description: Verbosity of the add-on's own log output.
