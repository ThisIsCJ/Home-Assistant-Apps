name: Builder

# Publishes per-arch add-on images to GHCR so installs pull a prebuilt image
# instead of compiling on the user's machine. After the first successful run,
# uncomment the `image:` key in devops-platform/config.yaml and bump the
# version so the Supervisor starts pulling.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }} add-on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish add-on image
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/devops-platform \
            --image {arch}-addon-devops-platform \
            --docker-hub ghcr.io/${{ github.repository_owner }}
