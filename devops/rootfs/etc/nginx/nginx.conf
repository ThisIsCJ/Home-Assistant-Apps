daemon off;
worker_processes 1;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099 default_server;
        root /opt/app/www;
        index index.html;

        # Only the Home Assistant ingress gateway (and local health checks)
        # may talk to us. The X-Remote-User-* headers it forwards are the
        # sole source of user identity, so nothing else may connect.
        #
        # These headers are NOT stripped here on purpose: the Supervisor sets
        # (and overwrites) them on every ingress request before it reaches this
        # server, so what arrives is always the Supervisor's authoritative
        # value — a client cannot smuggle its own past the ingress proxy. The
        # IP allow-list above, plus binding the Node services to 127.0.0.1
        # (BIND_HOST in run.sh), is what prevents any un-proxied request from
        # reaching a backend. Blanking the headers here would instead discard
        # the Supervisor's identity and break authentication.
        allow 172.30.32.2;
        allow 127.0.0.1;
        deny all;

        # Provisioning module
        location = /api/requests {
            proxy_pass http://127.0.0.1:4200;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            add_header Cache-Control "no-store";
        }
        location ^~ /api/requests/ {
            proxy_pass http://127.0.0.1:4200;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            add_header Cache-Control "no-store";
        }
        location ^~ /api/app/ {
            proxy_pass http://127.0.0.1:4200;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            add_header Cache-Control "no-store";
        }
        location ^~ /api/admin/ {
            proxy_pass http://127.0.0.1:4200;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            add_header Cache-Control "no-store";
        }

        # Monitor module
        location ^~ /api/monitor/ {
            proxy_pass http://127.0.0.1:4100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
            add_header Cache-Control "no-store";
        }

        # Core API
        location ^~ /api/ {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            add_header Cache-Control "no-store";
        }

        location = /env-config.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
        }

        # SPA — hash routing, so index.html is only ever requested at the root
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
