name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  addon-lint:
    name: Add-on lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./devops-platform

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: devops-platform/app/package-lock.json

      - name: Build frontend
        working-directory: devops-platform/app
        run: |
          npm ci
          npm run build
