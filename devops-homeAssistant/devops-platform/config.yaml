name: DevOps Platform
version: "1.1.1"
slug: devops_platform
description: Self-hosted DevOps provisioning, monitoring and site-request platform
arch:
  - amd64
  - aarch64
# Uncomment once prebuilt images are published (see .github/workflows/builder.yaml)
# so installs pull instead of compiling locally:
# image: ghcr.io/csaba/{arch}-addon-devops-platform
# The HA base image ships s6-overlay, which must run as PID 1
init: false
startup: services
boot: auto
# Stop the add-on while a backup runs so the MongoDB data files in /data are
# captured in a consistent state.
backup: cold
# Restart the add-on if nginx stops accepting connections.
watchdog: tcp://[HOST]:8099
# Served exclusively through Home Assistant ingress — no host ports are
# exposed, and HA handles authentication for every request.
ingress: true
ingress_port: 8099
panel_icon: mdi:rocket-launch
panel_title: DevOps
panel_admin: true
options:
  app_name: DevOps Platform
  admin_group: devops-admins
  admin_users: []
  external_mongo_uri: ""
  log_level: info
schema:
  app_name: str
  admin_group: str
  # HA usernames that get platform-admin rights. Empty list = every HA user
  # who can open the panel is an admin.
  admin_users:
    - str
  # Leave empty to use the bundled MongoDB (data stored in /data/mongodb).
  # Set to a mongodb:// URI to use an external MongoDB instead.
  external_mongo_uri: str?
  log_level: list(debug|info|warning|error)
