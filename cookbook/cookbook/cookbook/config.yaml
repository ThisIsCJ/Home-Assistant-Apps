name: Cookbook
version: "1.2.1"
slug: cookbook
description: >-
  Shared recipe organizer with web import, ingredient scaling, ratings and
  comments. Backed by MongoDB, accessed through Home Assistant ingress.
url: https://github.com/your-org/ha-cookbook-addon
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
ingress: true
ingress_port: 4100
panel_icon: mdi:silverware-fork-knife
panel_title: Cookbook
hassio_api: false
homeassistant_api: false
options:
  mongo_uri: ""
  mongo_db: cookbook
  everyone_is_admin: false
  admin_users: []
schema:
  mongo_uri: str?
  mongo_db: str?
  everyone_is_admin: bool?
  admin_users:
    - str
